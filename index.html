<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrampoAC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
    .hero { background: #25d366; color: white; padding: 40px 0; text-align: center; }
    .card-prestador { border: none; border-radius: 15px; transition: 0.3s; margin-bottom: 20px; background: white; cursor: pointer; }
    .card-prestador:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .img-perfil { width: 100%; height: 200px; object-fit: cover; border-radius: 15px 15px 0 0; }
    .btn-zap { background-color: #25d366; color: white; font-weight: bold; border-radius: 10px; border: none; padding: 10px; width: 100%; }
  </style>
</head>
<body>

<div id="barraLogin" class="bg-dark text-white p-2 text-end" style="font-size: 0.8rem;">
  <span id="userStatus">Verificando...</span>
</div>

<div class="hero">
  <h1>TrampoAC</h1>
  <p>Profissionais em Brasiléia e Epitaciolândia</p>
</div>

<div class="container mt-4">
  <div id="listaPrestadores" class="row">
    <p class="text-center">A carregar profissionais...</p>
  </div>
</div>

<script>
  // COLOQUE AQUI O SEU NOVO URL GERADO NO PASSO ANTERIOR
  const API_URL = "https://script.google.com/macros/s/AKfycby50C69Vi5E9kk4WgV7geyQ03UPQ8QzULyzfCdCRLHjAp-OMIxhDPyQncONc1ZsIT_xeg/exec";

  window.onload = function() {
    carregarCategorias();
    carregarPrestadores();
    verificarLogin();
  };

  function carregarPrestadores() {
    fetch(`${API_URL}?acao=dados`)
      .then(res => res.json())
      .then(lista => {
        const div = document.getElementById('listaPrestadores');
        div.innerHTML = '';
        if (lista.erro) throw new Error(lista.erro);
        
        lista.forEach(p => {
          div.innerHTML += `
            <div class="col-md-4 mb-4">
              <div class="card card-prestador shadow-sm">
                <img src="${p.foto || 'https://via.placeholder.com/300'}" class="img-perfil">
                <div class="card-body text-center">
                  <h5 class="card-title">${p.nome}</h5>
                  <p class="text-success fw-bold">${p.categoria}</p>
                  <a href="https://wa.me/55${p.whatsapp}" target="_blank" class="btn btn-zap">WhatsApp</a>
                </div>
              </div>
            </div>`;
        });
      })
      .catch(err => {
        document.getElementById('listaPrestadores').innerHTML = `<p class="text-center text-danger">Erro ao carregar: ${err.message}</p>`;
      });
  }

  function verificarLogin() {
    fetch(`${API_URL}?acao=verificar`)
      .then(res => res.json())
      .then(res => {
        const status = document.getElementById('userStatus');
        if (res.logado) {
          status.innerHTML = `Logado: ${res.email}`;
        } else {
          status.innerHTML = `<a href="${API_URL}" target="_blank" class="text-white">Fazer Login</a>`;
        }
      });
  }

  function carregarCategorias() {
    fetch(`${API_URL}?acao=categorias`).then(res => res.json()).then(console.log);
  }
</script>
</body>
</html>
