<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrampoAC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
    .hero { background: #25d366; color: white; padding: 40px 0; text-align: center; }
    .card-prestador { border: none; border-radius: 15px; transition: 0.3s; margin-bottom: 20px; position: relative; background: white; }
    .card-prestador:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .img-perfil { width: 100%; height: 200px; object-fit: cover; border-radius: 15px 15px 0 0; background: #ddd; }
    .btn-zap { background-color: #25d366; color: white; font-weight: bold; border-radius: 10px; border: none; padding: 10px; }
    .btn-zap:hover { background-color: #128c7e; color: white; }
    .badge-cidade { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; z-index: 10; }
    #secaoCadastro { display: none; background: white; border-radius: 15px; padding: 20px; margin-top: 20px; border: 2px solid #25d366; }
  </style>
</head>
<body>

<div id="barraLogin" class="bg-dark text-white p-2 text-end" style="font-size: 0.8rem;">
  <span id="userStatus">Verificando login...</span>
</div>

<div class="hero">
  <h1>TrampoAC</h1>
  <p>Encontre profissionais em Brasiléia e Epitaciolândia</p>
  <div class="container mt-3">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <select id="filtroCategoria" class="form-select form-select-lg" onchange="filtrar()">
          <option value="">Todas as Categorias</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="container mt-4">
  <div id="listaPrestadores" class="row">
    <p class="text-center">Carregando profissionais...</p>
  </div>

  <div class="text-center my-5">
    <button class="btn btn-outline-success" onclick="toggleCadastro()">Sou Profissional e quero me cadastrar</button>
  </div>

  <div id="secaoCadastro" class="mb-5">
    <h3 class="text-center">Novo Cadastro</h3>
    <form id="formCadastro">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Nome Profissional</label>
          <input type="text" name="nome" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Categoria</label>
          <select id="selectCatCadastro" name="categoria" class="form-select" required></select>
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">WhatsApp (com DDD)</label>
          <input type="number" name="whatsapp" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Cidade</label>
          <select name="cidade" class="form-select">
            <option value="Brasiléia">Brasiléia</option>
            <option value="Epitaciolândia">Epitaciolândia</option>
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">E-mail (Google)</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Foto de Perfil</label>
        <input type="file" id="fotoFile" name="foto" class="form-control" accept="image/*">
      </div>
      <div class="mb-3">
        <label class="form-label">Descrição</label>
        <textarea name="descricao" class="form-control" rows="2"></textarea>
      </div>
      <button type="submit" class="btn btn-success w-100" id="btnSalvar">Finalizar Cadastro</button>
    </form>
    <div id="status" class="mt-3 text-center fw-bold"></div>
  </div>
</div>

<div class="container mt-5 pb-5">
  <div class="card border-primary">
    <div class="card-header bg-primary text-white text-center fw-bold">PAINEL DO PRESTADOR</div>
    <div class="card-body">
      <form id="formPortfolio">
        <div class="mb-3">
          <label class="form-label small fw-bold">Seu Token de Acesso</label>
          <input type="text" name="token" id="tokenPort" class="form-control" required>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">Foto do Serviço</label>
            <input type="file" id="fotoPortfolio" class="form-control" accept="image/*" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">Preço (R$)</label>
            <input type="text" name="preco" id="precoPort" class="form-control">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Descrição</label>
          <input type="text" name="descricao" id="descPort" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold" id="btnPort">Enviar para Portfólio</button>
      </form>
      <div id="statusPort" class="mt-2 text-center small fw-bold"></div>
    </div>
  </div>
</div>

<script>
  // COLE O SEU URL DO GOOGLE APPS SCRIPT AQUI
  const API_URL = "https://script.google.com/macros/s/AKfycbwp3i2qKzEmvKsnVrDb350RyEp5RS1lq7G019QLDgt4Ud46mWWJLXRFEVqXTlgvgkhe_A/exec";
  let todosPrestadores = [];

  window.onload = function() {
    // Busca Categorias
    fetch(`${API_URL}?acao=categorias`)
      .then(res => res.json())
      .then(lista => {
        const fBusca = document.getElementById('filtroCategoria');
        const fCad = document.getElementById('selectCatCadastro');
        lista.forEach(item => {
          const opt = document.createElement('option');
          opt.value = item; opt.innerText = item;
          fBusca.appendChild(opt.cloneNode(true));
          fCad.appendChild(opt);
        });
      });

    // Verifica Login
    fetch(`${API_URL}?acao=verificar`)
      .then(res => res.json())
      .then(status => {
        const userStatus = document.getElementById('userStatus');
        if (status.logado) {
          userStatus.innerHTML = `Logado como: <b>${status.email}</b>`;
          if (status.id) {
            document.getElementById('tokenPort').value = "ACESSO_GOOGLE";
            document.getElementById('tokenPort').disabled = true;
          }
        } else {
          userStatus.innerHTML = `<a href="${API_URL}" target="_blank" class="text-white">Fazer Login com Google</a>`;
        }
      });

    carregarPrestadores();
  };

  function carregarPrestadores() {
    fetch(`${API_URL}?acao=dados`)
      .then(res => res.json())
      .then(lista => {
        todosPrestadores = lista;
        renderizar(lista);
      });
  }

  function renderizar(lista) {
    const div = document.getElementById('listaPrestadores');
    div.innerHTML = '';
    lista.forEach(p => {
      div.innerHTML += `
        <div class="col-md-4 mb-4">
          <div class="card card-prestador shadow-sm">
            <span class="badge-cidade">${p.cidade}</span>
            <img src="${p.foto || 'https://via.placeholder.com/300'}" class="img-perfil">
            <div class="card-body text-center">
              <h5 class="card-title">${p.nome}</h5>
              <p class="text-success fw-bold">${p.categoria}</p>
              <a href="https://wa.me/55${p.whatsapp}" class="btn btn-zap w-100">WhatsApp</a>
            </div>
          </div>
        </div>`;
    });
  }

  function filtrar() {
    const cat = document.getElementById('filtroCategoria').value;
    renderizar(cat ? todosPrestadores.filter(p => p.categoria === cat) : todosPrestadores);
  }

  function toggleCadastro() {
    const s = document.getElementById('secaoCadastro');
    s.style.display = (s.style.display === 'none') ? 'block' : 'none';
  }

  // ENVIO DE FORMULÁRIO (CADASTRO)
  document.getElementById('formCadastro').onsubmit = function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSalvar');
    btn.disabled = true;
    
    const leitor = new FileReader();
    const arquivo = document.getElementById('fotoFile').files[0];
    
    const dados = {
      tipo: "cadastro",
      nome: this.nome.value,
      categoria: this.categoria.value,
      whatsapp: this.whatsapp.value,
      cidade: this.cidade.value,
      email: this.email.value,
      descricao: this.descricao.value
    };

    if (arquivo) {
      leitor.onload = function(evt) {
        dados.fotoPerfil = evt.target.result;
        enviarParaAPI(dados);
      };
      leitor.readAsDataURL(arquivo);
    } else {
      enviarParaAPI(dados);
    }
  };

  function enviarParaAPI(dados) {
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(dados)
    })
    .then(res => res.json())
    .then(res => {
      alert(res.resultado);
      location.reload();
    });
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
