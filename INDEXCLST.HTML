<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
    .hero { background: #25d366; color: white; padding: 40px 0; text-align: center; }
    .card-prestador { border: none; border-radius: 15px; transition: 0.3s; margin-bottom: 20px; position: relative; background: white; }
    .card-prestador:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .img-perfil { width: 100%; height: 200px; object-fit: cover; border-radius: 15px 15px 0 0; background: #ddd; }
    .btn-zap { background-color: #25d366; color: white; font-weight: bold; border-radius: 10px; border: none; padding: 10px; }
    .btn-zap:hover { background-color: #128c7e; color: white; }
    .badge-cidade { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; z-index: 10; }
    #secaoCadastro { display: none; background: white; border-radius: 15px; padding: 20px; margin-top: 20px; border: 2px solid #25d366; }
  </style>
</head>
<body>

<div id="barraLogin" class="bg-dark text-white p-2 text-end" style="font-size: 0.8rem;">
  <span id="userStatus">Verificando login...</span>
</div>

<div class="hero">
  <h1>TrampoAC</h1>
  <p>Encontre profissionais em Brasiléia e Epitaciolândia</p>
  <div class="container mt-3">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <select id="filtroCategoria" class="form-select form-select-lg" onchange="filtrar()">
          <option value="">Todas as Categorias</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="container mt-4">
  <div id="listaPrestadores" class="row">
    <p class="text-center">Carregando profissionais...</p>
  </div>

  <div class="text-center my-5">
    <button class="btn btn-outline-success" onclick="toggleCadastro()">Sou Profissional e quero me cadastrar</button>
  </div>

  <div id="secaoCadastro" class="mb-5">
    <h3 class="text-center">Novo Cadastro</h3>
    <form id="formCadastro">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Nome Profissional</label>
          <input type="text" name="nome" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Categoria</label>
          <select id="selectCatCadastro" name="categoria" class="form-select" required></select>
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">WhatsApp (com DDD)</label>
          <input type="number" name="whatsapp" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Cidade</label>
          <select name="cidade" class="form-select">
            <option value="Brasiléia">Brasiléia</option>
            <option value="Epitaciolândia">Epitaciolândia</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="col-md-12 mb-3">
          <label class="form-label fw-bold">E-mail para Receber o Token</label>
          <input type="email" name="email" class="form-control" placeholder="exemplo@email.com" required>
          <div class="form-text">É para este e-mail que enviaremos a tua chave de edição.</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Foto de Perfil</label>
        <input type="file" id="fotoFile" name="foto" class="form-control" accept="image/*">
      </div>
      <div class="mb-3">
        <label class="form-label">Descrição do seu serviço</label>
        <textarea name="descricao" class="form-control" rows="2"></textarea>
      </div>
      <button type="submit" class="btn btn-success w-100" id="btnSalvar">Finalizar Cadastro</button>
    </form>
    <div id="status" class="mt-3 text-center fw-bold"></div>
  </div>
</div>

<hr>

<!-- PAINEL DO PRESTADOR (HTML fora do Script) -->
<div class="container mt-5 pb-5">
  <div class="card border-primary">
    <div class="card-header bg-primary text-white text-center fw-bold">PAINEL DO PRESTADOR: Postar no Portfólio</div>
    <div class="card-body">
      <form id="formPortfolio">
        <div class="mb-3">
          <label class="form-label small fw-bold">Seu Token de Acesso</label>
          <input type="text" name="token" id="tokenPort" class="form-control" placeholder="Cole seu token aqui" required>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">Foto do Produto/Serviço</label>
            <input type="file" id="fotoPortfolio" class="form-control" accept="image/*" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">Preço (R$)</label>
            <input type="text" name="preco" id="precoPort" class="form-control" placeholder="Ex: 50,00">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Descrição do Trabalho</label>
          <input type="text" name="descricao" id="descPort" class="form-control" placeholder="Ex: Bolo de Chocolate" required>
        </div>
        <div class="mb-3">
          <label class="form-label d-block small fw-bold">Formas de Pagamento para este item:</label>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" name="pagamento" value="Pix" id="pPix">
            <label class="form-check-label" for="pPix">Pix</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" name="pagamento" value="Cartão" id="pCard">
            <label class="form-check-label" for="pCard">Cartão</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" name="pagamento" value="Dinheiro" id="pCash">
            <label class="form-check-label" for="pCash">Dinheiro</label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold" id="btnPort">Enviar para meu Portfólio</button>
      </form>
      <div id="statusPort" class="mt-2 text-center small fw-bold"></div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwp3i2qKzEmvKsnVrDb350RyEp5RS1lq7G019QLDgt4Ud46mWWJLXRFEVqXTlgvgkhe_A/exec";

  let todosPrestadores = [];

  window.onload = function() {
    // Ao carregar a página, verifica o login
    google.script.run.withSuccessHandler(function(status) {
      const userStatus = document.getElementById('userStatus');
      if (status.logado) {
        userStatus.innerHTML = `Logado como: <b>${status.email}</b>`;
        // Se ele já estiver na planilha, podemos preencher o Token automaticamente
        if (status.id) {
           document.getElementById('tokenPort').value = "ACESSO_GOOGLE"; // Usaremos isso como bypass
           document.getElementById('tokenPort').disabled = true;
        }
      } else {
        // O target="_top" faz o navegador sair do "quadro" e abrir o login na aba inteira
        userStatus.innerHTML = `<a href="${window.location.href}" target="_top" class="text-white fw-bold">
          ⚠️ Clique aqui para fazer Login e liberar seu Painel
        </a>`;
        // O target="_top" faz o navegador sair do "quadro" e abrir o login na aba inteira
        userStatus.innerHTML = `<a href="${window.location.href}" target="_top" class="text-white fw-bold">
          ⚠️ Clique aqui para fazer Login e liberar seu Painel
        </a>`;
      }
    }).verificarAcessoPrestador();

    google.script.run.withSuccessHandler(function(lista) {
      const fBusca = document.getElementById('filtroCategoria');
      const fCad = document.getElementById('selectCatCadastro');
      lista.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item; 
        opt.innerHTML = item;
        fBusca.appendChild(opt.cloneNode(true));
        fCad.appendChild(opt);
      });
    }).buscarCategorias();

    carregarPrestadores();
  };

  // LOGICA DO PORTFOLIO
  document.getElementById('formPortfolio').onsubmit = function(e) {
    e.preventDefault();
    let btn = document.getElementById('btnPort');
    btn.disabled = true;
    document.getElementById('statusPort').innerText = "Enviando...";

    let checkboxes = document.querySelectorAll('input[name="pagamento"]:checked');
    let pagamentos = Array.from(checkboxes).map(cb => cb.value).join(", ");

    let file = document.getElementById('fotoPortfolio').files[0];
    let dados = {
      token: document.getElementById('tokenPort').value,
      preco: document.getElementById('precoPort').value,
      descricao: document.getElementById('descPort').value,
      pagamentos: pagamentos
    };

    let reader = new FileReader();
    reader.onload = function(event) {
      dados.foto = event.target.result;
      dados.mimeType = file.type;
      google.script.run.withSuccessHandler(function(res) {
        document.getElementById('statusPort').innerText = res;
        document.getElementById('formPortfolio').reset();
        btn.disabled = false;
      }).postarNoPortfolio(dados);
    };
    reader.readAsDataURL(file);
  };

  function carregarPrestadores() {
    google.script.run.withSuccessHandler(function(lista) {
      todosPrestadores = lista;
      renderizar(lista);
    }).buscarPrestadores();
  }

  function renderizar(lista) {
    const div = document.getElementById('listaPrestadores');
    div.innerHTML = '';
    lista.forEach(p => {
      const msg = encodeURIComponent("Olá " + p.nome + ", vi seu perfil no TrampoAC.");
      const linkZap = "https://wa.me/55" + p.whatsapp + "?text=" + msg;
      div.innerHTML += `
        <div class="col-md-4 mb-4">
          <div class="card card-prestador shadow-sm" onclick="abrirPortfolio('${p.id}', '${p.nome}', '${linkZap}')" style="cursor:pointer">
            <span class="badge-cidade">${p.cidade}</span>
            <img src="${p.foto || 'https://via.placeholder.com/300'}" class="img-perfil">
            <div class="card-body text-center">
              <h5 class="card-title">${p.nome}</h5>
              <p class="text-success fw-bold mb-1">${p.categoria}</p>
            <p class="small text-muted mb-2">Clique para ver portfólio</p>
            <a href="${linkZap}" target="_blank" class="btn btn-zap w-100" onclick="event.stopPropagation();">
              Chamar no WhatsApp
            </a>
            </div>
          </div>
        </div>`;
    });
  }

  function abrirPortfolio(id, nome, linkZap) {
    document.getElementById('nomeNoModal').innerText = "Portfólio de " + nome;
    document.getElementById('linkZapModal').href = linkZap;
    document.getElementById('conteudoPortfolio').innerHTML = '<p class="text-center">Carregando portfólio...</p>';
    
    var myModal = new bootstrap.Modal(document.getElementById('modalPortfolio'));
    myModal.show();

    google.script.run.withSuccessHandler(function(itens) {
      const container = document.getElementById('conteudoPortfolio');
      container.innerHTML = '';
      
      if (itens.length === 0) {
        container.innerHTML = '<p class="text-center">Este profissional ainda não postou fotos do trabalho.</p>';
        return;
      }

      itens.forEach(item => {
        container.innerHTML += `
          <div class="col-12 mb-4">
            <div class="card h-100 border-0 shadow-sm" style="border-radius: 15px; overflow: hidden;">
              <img src="${item.foto}" class="img-fluid" style="width: 100%; max-height: 350px; object-fit: contain; background: #f8f9fa;">
              <div class="card-body p-3">
                <div class="d-flex justify-content-between align-items-start">
                  <h6 class="fw-bold mb-1" style="color: #333;">${item.descricao}</h6>
                  <span class="badge bg-success-subtle text-success fw-bold" style="font-size: 0.9rem;">
                    ${item.preco ? 'R$ ' + item.preco : 'A combinar'}
                  </span>
                </div>
                <p class="text-muted mb-0" style="font-size: 0.8rem;">
                  <i class="bi bi-credit-card"></i> Pagamento: <strong>${item.pagamento}</strong>
                </p>
              </div>
            </div>
          </div>`;
      });
    }).buscarPortfolio(id);
  }

  function filtrar() {
    const cat = document.getElementById('filtroCategoria').value;
    renderizar(cat ? todosPrestadores.filter(p => p.categoria === cat) : todosPrestadores);
  }

  function toggleCadastro() {
    const s = document.getElementById('secaoCadastro');
    s.style.display = (s.style.display === 'none' || s.style.display === '') ? 'block' : 'none';
    if(s.style.display === 'block') s.scrollIntoView({ behavior: 'smooth' });
  }

  document.getElementById('formCadastro').onsubmit = function(e) {
    e.preventDefault();
    document.getElementById('btnSalvar').disabled = true;

    const dados = {
      nome: this.nome.value,
      categoria: this.categoria.value,
      whatsapp: this.whatsapp.value,
      cidade: this.cidade.value,
      descricao: this.descricao.value,
      email: this.email.value,
      fotoMimeType: "",
      fotoPerfil: ""
    };

    const file = this.foto.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        dados.fotoPerfil = e.target.result;
        dados.fotoMimeType = file.type;
        google.script.run.withSuccessHandler(finalizar).salvarPrestadorComFoto(dados);
      };
      reader.readAsDataURL(file);
    } else {
      google.script.run.withSuccessHandler(finalizar).salvarPrestadorComFoto(dados);
    }
  };

  function finalizar(res) {
    // Mostra um alerta verde com o resultado e o Token
    document.getElementById('status').innerHTML = `
      <div class="alert alert-success border-2 shadow-sm">
        <h4 class="alert-heading">Sucesso!</h4>
        <p>${res}</p>
        <hr>
        <p class="mb-0 small">Verifique sua caixa de entrada (e o spam).</p>
      </div>
    `;
    document.getElementById('formCadastro').reset();
    document.getElementById('btnSalvar').disabled = false;
    carregarPrestadores();
  }
</script>
<!-- Modal do Portfólio -->
<div class="modal fade" id="modalPortfolio" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content" style="border-radius: 0;">
      <div class="modal-header border-bottom">
        <h5 class="modal-title fw-bold" id="nomeNoModal">Portfólio</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="conteudoPortfolio" class="row">
          <!-- Os itens do portfólio entrarão aqui -->
        </div>
      </div>
      <div class="modal-footer border-top bg-light">
        <div class="container">
          <a id="linkZapModal" href="#" target="_blank" class="btn btn-zap w-100 py-3">Chamar no WhatsApp Agora</a>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Script do Bootstrap (Necessário para o Modal) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
